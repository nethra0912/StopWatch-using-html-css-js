<!DOCTYPE html>
<html>
<head>
    <title>Stopwatch</title>
  <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:"Segoe UI",sans-serif;
        }
        body{
            background:#111827;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }
    .container{
            width:700px;
            background:#1f2937;
            padding:40px;
            border-radius:18px;
            box-shadow:0 15px 35px rgba(0,0,0,0.45);
            text-align:center;
        }
        h1{
            color:#f9fafb;
            font-size:34px;
            margin-bottom:25px;
            font-weight:600;
        }
        #display{
            width:100%;
            background:#111827;
            color:#ffffff;
            border:2px solid #374151;
            border-radius:12px;
            padding:25px;
            font-size:70px;
            font-weight:bold;
            letter-spacing:8px;
            margin-bottom:35px;
        }
        .buttons{
            display:flex;
            justify-content:center;
            gap:20px;
            margin-bottom:35px;
        }
       button{
            border:none;
            padding:14px 28px;
            border-radius:8px;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
        }
        button:hover{
            transform:translateY(-3px);
        }
        .start{
            background:#16a34a;
            color:white;
        }
        .stop{
            background:#dc2626;
            color:white;
        }
        .reset{
            background:#4b5563;
            color:white;
        }
        .lap{
            background:#2563eb;
            color:white;
        }
        h3{
            color:#d1d5db;
            margin-bottom:15px;
            text-align:left;
        }
        #laps{
            list-style:none;
            max-height:180px;
            overflow-y:auto;
        }
#laps li{
            background:#111827;
            border:1px solid #374151;
            color:#e5e7eb;
            padding:12px 18px;
            margin-bottom:10px;
            border-radius:8px;
            text-align:left;
            font-size:16px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Stopwatch</h1>
    <div id="display">00:00:00</div>
    <div class="buttons">
        <button class="start" onclick="start()">Start</button>
        <button class="stop" onclick="stop()">Stop</button>
        <button class="reset" onclick="reset()">Reset</button>
        <button class="lap" onclick="lap()">Lap</button>
    </div>

    <h3>Lap Times</h3>
 <ul id="laps"></ul>
</div>
<script>
let h=0;
let m=0;
let s=0;
let timer;
let running=false;
function update(){
    let hh=String(h).padStart(2,'0');
    let mm=String(m).padStart(2,'0');
    let ss=String(s).padStart(2,'0');
    document.getElementById("display").innerHTML=
    hh+":"+mm+":"+ss;
}
function start(){
    if(running)
        return;
    running=true;
    timer=setInterval(function(){
        s++;
        if(s==60){
            s=0;
            m++;
        }
        if(m==60){
            m=0;
            h++;
        }
        update();
    },1000);
}
function stop(){
    clearInterval(timer);
    running=false;
}
function reset(){
    stop();
    h=0;
    m=0;
    s=0;
    update();
    document.getElementById("laps").innerHTML="";
}
function lap(){
    if(!running)
        return;
    let li=document.createElement("li");
    li.innerHTML=document.getElementById("display").innerHTML;
    document.getElementById("laps").appendChild(li);
}
update();
</script>
</body>
</html>
